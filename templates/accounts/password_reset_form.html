{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-info text-white text-center">
          <h4 class="mb-0"><i class="fas fa-key me-2"></i>Reset Password</h4>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
              <label class="form-label" for="id_email"><i class="fas fa-envelope text-info"></i> Email</label>
              {{ form.email }}
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-info">Send Reset Email</button>
            </div>
          </form>
          <hr>
          <p class="text-center mb-0">
            <a href="{% url 'accounts_login' %}" class="text-decoration-none">Back to Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
