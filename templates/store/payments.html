{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --primary-green: #1a7a4a;
        --hover-green: #155f39;
        --light-bg: #f7f8fa;
        --border-color: #e8eaed;
    }

    body { background-color: var(--light-bg); }

    .payment-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        overflow: hidden;
    }

    .card-header-custom {
        background-color: var(--primary-green) !important;
        color: white !important;
        padding: 1.5rem;
    }

    /* Custom Radio Styling */
    .payment-option {
        border: 1.5px solid var(--border-color);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        cursor: pointer;
        transition: all 0.3s;
        display: block;
    }

    .payment-option:hover {
        border-color: var(--primary-green);
        background-color: #f0fdf4;
    }

    .form-check-input:checked + .payment-option {
        border-color: var(--primary-green);
        background-color: #f0fdf4;
        box-shadow: 0 0 0 1px var(--primary-green);
    }

    .payment-option i {
        font-size: 1.2rem;
        margin-right: 10px;
        color: var(--primary-green);
    }

    /* Button Styling */
    .btn-pay {
        background-color: var(--primary-green) !important;
        border: none;
        color: white !important;
        padding: 14px;
        border-radius: 50px;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-pay:hover {
        background-color: var(--hover-green) !important;
        transform: translateY(-2px);
    }

    .btn-back {
        border-radius: 50px;
        padding: 10px 25px;
        font-weight: 600;
        color: #6b7280;
    }

    .hidden { display: none !important; }
</style>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card payment-card">
        <div class="card-header card-header-custom text-center">
          <h4 class="mb-0 fw-bold"><i class="fas fa-shield-alt me-2"></i>Secure Payment</h4>
        </div>
        <div class="card-body p-4 p-lg-5">
          <h5 class="mb-4 fw-bold">Select Payment Method</h5>

          <label class="w-100">
            <input class="form-check-input d-none" type="radio" name="payment_method" id="stripe" value="Stripe" checked>
            <div class="payment-option">
              <div class="d-flex justify-content-between align-items-center">
                <span><i class="fas fa-credit-card"></i> Card / UPI (Stripe)</span>
                <i class="fas fa-check-circle check-mark hidden"></i>
              </div>
            </div>
          </label>

          <label class="w-100">
            <input class="form-check-input d-none" type="radio" name="payment_method" id="cod" value="COD">
            <div class="payment-option">
              <div class="d-flex justify-content-between align-items-center">
                <span><i class="fas fa-truck"></i> Cash on Delivery</span>
                <i class="fas fa-check-circle check-mark hidden"></i>
              </div>
            </div>
          </label>

          <hr class="my-4">

          <div id="stripe-payment" class="payment-section">
            <p class="small text-muted mb-3"><i class="fas fa-info-circle me-1"></i> You will be redirected to Stripe's secure portal.</p>
            <button id="stripe-checkout-btn" class="btn btn-pay w-100">Pay with Stripe Now</button>
          </div>

          <div id="cod-payment" class="payment-section hidden">
            <div class="alert alert-sm alert-info py-2" style="font-size: 14px;">
              <i class="fas fa-info-circle me-1"></i> Pay with cash upon delivery.
            </div>
            <button id="cod-btn" class="btn btn-pay w-100">Confirm COD Order</button>
          </div>

          <div class="text-center mt-4">
            <a href="{% url 'store:checkout' %}" class="btn btn-back btn-outline-secondary">
              <i class="fas fa-arrow-left me-1"></i> Back to Checkout
            </a>
          </div>
        </div>
      </div>
      
      <div class="mt-4 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/349/349221.png" width="40" class="mx-1 opacity-50">
        <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" width="40" class="mx-1 opacity-50">
        <img src="https://cdn-icons-png.flaticon.com/512/349/349230.png" width="40" class="mx-1 opacity-50">
      </div>
    </div>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const stripe = Stripe('{{ STRIPE_PUBLISHABLE_KEY }}');
    const checkoutBtn = document.getElementById('stripe-checkout-btn');
    const codBtn = document.getElementById('cod-btn');
    const paymentMethods = document.querySelectorAll('input[name="payment_method"]');

    paymentMethods.forEach(method => {
        method.addEventListener('change', function() {
            // Toggle sections
            if (this.value === 'Stripe') {
                document.getElementById('stripe-payment').classList.remove('hidden');
                document.getElementById('cod-payment').classList.add('hidden');
            } else {
                document.getElementById('stripe-payment').classList.add('hidden');
                document.getElementById('cod-payment').classList.remove('hidden');
            }
        });
    });

    // Stripe Checkout Logic
    checkoutBtn.addEventListener('click', function() {
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        this.disabled = true;

        fetch('{% url "store:create_checkout_session" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                stripe.redirectToCheckout({ sessionId: data.id });
            } else {
                alert('Error creating checkout session');
                this.innerHTML = 'Pay with Stripe Now';
                this.disabled = false;
            }
        });
    });

    // COD Logic
    codBtn.addEventListener('click', function() {
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Placing Order...';
        this.disabled = true;

        fetch('{% url "store:payments" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                'payment_id': 'COD-' + Date.now(),
                'payment_method': 'COD',
                'status': 'Pending'
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.order_number) {
                window.location.href = '{% url "store:order_complete" %}?order_number=' + data.order_number + '&payment_id=' + data.transID;
            } else {
                alert('Something went wrong!');
                this.innerHTML = 'Confirm COD Order';
                this.disabled = false;
            }
        });
    });
});
</script>
{% endblock %}
