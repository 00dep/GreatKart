<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#0a3d8f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)" rx="8"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="200" r="280" fill="#ffffff" opacity="0.05"/>
  <circle cx="1050" cy="100" r="150" fill="#ffffff" opacity="0.05"/>

  <!-- Tagline -->
  <text x="80" y="140" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Shop Everything</text>
  <text x="80" y="200" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800" fill="#cce0ff">You Love.</text>
  <text x="80" y="255" font-family="Segoe UI, sans-serif" font-size="20" font-weight="400" fill="#a8caff">Free shipping on orders over $50 · New arrivals daily</text>

  <!-- CTA Button mockup -->
  <rect x="80" y="290" width="180" height="52" rx="6" fill="#ffffff"/>
  <text x="170" y="322" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#0d6efd">Shop Now →</text>

  <!-- Right side product mockup shapes -->
  <rect x="780" y="60" width="340" height="280" rx="16" fill="#ffffff" opacity="0.08"/>
  <circle cx="950" cy="200" r="110" fill="#ffffff" opacity="0.10"/>
  <rect x="860" y="120" width="180" height="160" rx="10" fill="#ffffff" opacity="0.15"/>
  <rect x="880" y="140" width="140" height="100" rx="6" fill="#e0ecff" opacity="0.5"/>
  <text x="950" y="310" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#ffffff" opacity="0.6">Featured Product</text>
</svg>
