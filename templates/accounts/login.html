{% extends 'base.html' %}

{% block content %}
<style>
    :root {
        --primary-green: #1a7a4a; /* আপনার ব্র্যান্ড কালার */
        --hover-green: #155f39;   /* হোভার কালার */
        --light-bg: #f7f8fa;
    }

    /* লগইন বাটনের স্টাইল */
    .btn-custom {
        background-color: var(--primary-green) !important;
        border-color: var(--primary-green) !important;
        color: white !important;
        border-radius: 50px;
        padding: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-custom:hover {
        background-color: var(--hover-green) !important;
        transform: translateY(-2px);
    }

    /* 'Create Account' আউটলাইন বাটনের স্টাইল */
    .btn-outline-custom {
        color: var(--primary-green) !important;
        border-color: var(--primary-green) !important;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-outline-custom:hover {
        background-color: var(--primary-green) !important;
        color: white !important;
    }

    /* কার্ড হেডার স্টাইল */
    .card-header-custom {
        background-color: var(--primary-green) !important;
        color: white !important;
        border-radius: 16px 16px 0 0 !important;
    }

    .text-custom {
        color: var(--primary-green) !important;
    }

    .card-shadow {
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border-radius: 16px;
    }
</style>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5"> <div class="card card-shadow border-0">
        <div class="card-header card-header-custom text-center py-3">
          <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Sign In</h4>
        </div>
        <div class="card-body p-4 p-lg-5">
          <form method="post" action="{% url 'accounts_login' %}">
            {% csrf_token %}
            {{ form.non_field_errors }}
            
            <div class="mb-3">
              <label class="form-label" for="id_username">
                <i class="fas fa-envelope text-custom"></i> Email
              </label>
              {{ form.username }}
            </div>
            
            <div class="mb-4">
              <label class="form-label" for="id_password">
                <i class="fas fa-lock text-custom"></i> Password
              </label>
              {{ form.password }}
            </div>
            
            <div class="d-grid">
              <button type="submit" class="btn btn-custom">Log In</button>
            </div>
          </form>
          
          <div class="text-center mt-3">
            <a href="{% url 'accounts_password_reset' %}" class="text-decoration-none text-muted small">Forgot password?</a>
          </div>
          
          <hr class="my-4">
          
          <div class="text-center">
            <p class="text-muted small mb-3">Don't have an account?</p>
            <a href="{% url 'accounts_register' %}" class="btn btn-outline-custom px-4">Create Account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
