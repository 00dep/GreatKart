{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-warning text-white text-center">
          <h4 class="mb-0"><i class="fas fa-unlock-alt me-2"></i>New Password</h4>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
              <label class="form-label" for="id_new_password1"><i class="fas fa-lock text-warning"></i> New Password</label>
              {{ form.new_password1 }}
            </div>
            <div class="mb-3">
              <label class="form-label" for="id_new_password2"><i class="fas fa-lock text-warning"></i> Confirm New Password</label>
              {{ form.new_password2 }}
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-warning">Change Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
